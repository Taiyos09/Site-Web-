  <rect x="390" y="500" width="70" height="90" fill="#7d1f1f"/>
  <rect x="530" y="500" width="70" height="90" fill="#7d1f1f"/>
  <rect x="670" y="500" width="70" height="90" fill="#7d1f1f"/>

